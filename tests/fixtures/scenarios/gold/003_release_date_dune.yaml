name: release_date_dune
user_query: When was Dune released?
request_plan:
  intent: release_date
  request_type: release-date
  entities_typed:
    movies:
    - Dune
    people: []
  need_freshness: false
  freshness_ttl_hours: 6.0
  require_tier_a: true
  allowed_source_tiers:
  - A
  - B
  reject_tier_c: true
  response_format: short_fact
  constraints: {}
evidence_input:
- source: kaggle_imdb
  url: https://www.imdb.com/title/tt1160419/
  title: Dune
  content: Dune (2021) is a science fiction epic film directed by Denis Villeneuve,
    released on October 22, 2021.
  year: 2021
  tier: A
expected:
  template_id: release_date
  prompt_checks:
    required_sections:
    - system
    - developer
    - user
    must_contain:
    - release
    - Dune
    - 2021
    must_not_contain:
    - Tier
    - Kaggle
    - Tavily
    - authoritative structured data
  evidence_checks:
    dedupe_expected_count: 1
    max_snippet_len: 400
  validator_checks:
    expected_valid: true
    enforce_clean: true
  sample_model_output: Dune was released on October 22, 2021.
