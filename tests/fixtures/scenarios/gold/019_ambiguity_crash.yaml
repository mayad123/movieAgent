name: ambiguity_crash
user_query: When was Crash released?
request_plan:
  intent: release_date
  request_type: release-date
  entities_typed:
    movies:
    - Crash
    people: []
  need_freshness: false
  freshness_ttl_hours: 6.0
  require_tier_a: true
  allowed_source_tiers:
  - A
  - B
  reject_tier_c: true
  response_format: short_fact
  constraints: {}
  entity_years:
    Crash: 2004
evidence_input:
- source: kaggle_imdb
  url: https://www.imdb.com/title/tt0375679/
  title: Crash
  content: Crash (2004) was released on September 10, 2004.
  year: 2004
  tier: A
expected:
  template_id: release_date
  prompt_checks:
    required_sections:
    - system
    - developer
    - user
    must_contain:
    - release
    - Crash
    - 2004
    must_not_contain:
    - Tier
    - Kaggle
    - Tavily
    - authoritative structured data
  evidence_checks:
    dedupe_expected_count: 1
    max_snippet_len: 400
    must_not_contain_terms:
    - Tier
    - kaggle_imdb
  validator_checks:
    expected_valid: true
    expected_violation_types: []
    enforce_clean: true
  sample_model_output: Crash (2004) was released on September 10, 2004.

