name: freshness_now_playing
user_query: "Is Dune: Part Two playing in theaters now?"
request_plan:
  intent: availability
  request_type: info
  entities_typed:
    movies:
    - "Dune: Part Two"
    people: []
  need_freshness: true
  freshness_ttl_hours: 6.0
  require_tier_a: false
  allowed_source_tiers:
  - A
  - B
  - C
  reject_tier_c: false
  response_format: short_fact
  constraints: {}
evidence_input:
- source: tavily
  url: https://www.imdb.com/title/tt15239678/
  title: "Dune: Part Two - Theatrical Release"
  content: "As of December 2024, Dune: Part Two is no longer playing in theaters and is available on streaming platforms."
  tier: B
expected:
  template_id: availability
  prompt_checks:
    required_sections:
    - system
    - developer
    - user
    must_contain:
    - Dune
    - as of
    must_not_contain:
    - Tier
    - Kaggle
    - Tavily
    - authoritative structured data
  evidence_checks:
    dedupe_expected_count: 1
    max_snippet_len: 400
    must_not_contain_terms:
    - Tier
    - tavily
  validator_checks:
    expected_valid: true
    expected_violation_types: []
    enforce_clean: true
  sample_model_output: "As of December 2024, Dune: Part Two is no longer playing in theaters and is available on streaming platforms."

