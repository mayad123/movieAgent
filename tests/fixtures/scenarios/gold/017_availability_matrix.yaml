name: availability_matrix
user_query: Is The Matrix streaming anywhere?
request_plan:
  intent: availability
  request_type: info
  entities_typed:
    movies:
    - The Matrix
    people: []
  need_freshness: true
  freshness_ttl_hours: 6.0
  require_tier_a: false
  allowed_source_tiers:
  - A
  - B
  - C
  reject_tier_c: false
  response_format: short_fact
  constraints: {}
evidence_input:
- source: tavily
  url: https://www.justwatch.com/us/movie/the-matrix
  title: The Matrix - Streaming Availability
  content: As of December 2024, The Matrix is streaming on Netflix and available for
    rent on various platforms.
  tier: B
expected:
  template_id: availability
  prompt_checks:
    required_sections:
    - system
    - developer
    - user
    must_contain:
    - The Matrix
    - streaming
    - as of
    must_not_contain:
    - Tier
    - Kaggle
    - Tavily
    - authoritative structured data
  evidence_checks:
    dedupe_expected_count: 1
    max_snippet_len: 400
  validator_checks:
    expected_valid: true
    enforce_clean: true
  sample_model_output: As of December 2024, The Matrix is streaming on Netflix and
    available for rent on various platforms.
