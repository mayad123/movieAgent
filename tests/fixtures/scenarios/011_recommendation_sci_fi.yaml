name: recommendation_sci_fi
user_query: Recommend movies like The Matrix.
request_plan:
  intent: recommendation
  request_type: recs
  entities_typed:
    movies:
    - The Matrix
    people: []
  need_freshness: false
  freshness_ttl_hours: 336.0
  require_tier_a: false
  allowed_source_tiers:
  - A
  - B
  - C
  reject_tier_c: false
  response_format: list
  constraints: {}
evidence_input:
- source: tavily
  url: https://www.imdb.com/list/ls000000000/
  title: Movies Similar to The Matrix
  content: Similar movies include Inception, The Terminator, Blade Runner, and The
    Fifth Element.
  tier: B
- source: tavily
  url: https://www.rottentomatoes.com/m/the_matrix
  title: The Matrix - Similar Movies
  content: Fans of The Matrix also enjoyed Dark City, Total Recall, and Minority Report.
  tier: B
expected:
  template_id: recommendation
  prompt_checks:
    required_sections:
    - system
    - developer
    - user
    must_contain:
    - recommend
    - The Matrix
    must_not_contain: []
  evidence_checks:
    dedupe_expected_count: 2
    max_snippet_len: 400
  validator_checks:
    expected_valid: true
  sample_model_output: Movies similar to The Matrix include Inception, Blade Runner,
    The Terminator, and The Fifth Element. These films share themes of reality manipulation,
    dystopian futures, and mind-bending narratives. Each explores the boundaries between
    what is real and what is simulated. The visual style and philosophical depth make
    them perfect for fans of The Matrix's innovative approach. If you enjoyed The
    Matrix's blend of action and thought-provoking concepts, these films will likely
    appeal to you.
