name: recommendation_tarantino
user_query: What movies are similar to Pulp Fiction?
request_plan:
  intent: recommendation
  request_type: recs
  entities_typed:
    movies:
    - Pulp Fiction
    people: []
  need_freshness: false
  freshness_ttl_hours: 336.0
  require_tier_a: false
  allowed_source_tiers:
  - A
  - B
  - C
  reject_tier_c: false
  response_format: list
  constraints: {}
evidence_input:
- source: tavily
  url: https://www.imdb.com/list/ls000000001/
  title: Movies Like Pulp Fiction
  content: Similar films include Reservoir Dogs, Kill Bill, Django Unchained, and
    Inglourious Basterds.
  tier: B
expected:
  template_id: recommendation
  prompt_checks:
    required_sections:
    - system
    - developer
    - user
    must_contain:
    - similar
    - Pulp Fiction
  evidence_checks:
    dedupe_expected_count: 1
    max_snippet_len: 400
  validator_checks:
    expected_valid: true
  sample_model_output: Movies similar to Pulp Fiction include Reservoir Dogs, Kill
    Bill, Django Unchained, and Inglourious Basterds. These films all share Quentin
    Tarantino's distinctive style of nonlinear storytelling, sharp dialogue, and stylized
    violence. Each features complex characters and unexpected plot twists. The unique
    blend of dark humor and intense action makes them perfect for fans of Pulp Fiction's
    innovative narrative structure. If you enjoyed Pulp Fiction's unconventional approach
    to storytelling, these films will likely resonate with you.
