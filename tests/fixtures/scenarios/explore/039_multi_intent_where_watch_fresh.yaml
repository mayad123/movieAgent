name: multi_intent_where_watch_fresh
user_query: Where can I watch Inception and is it streaming now?
request_plan:
  intent: where_to_watch
  request_type: info
  entities_typed:
    movies:
    - Inception
    people: []
  need_freshness: true
  freshness_ttl_hours: 6.0
  require_tier_a: false
  allowed_source_tiers:
  - A
  - B
  - C
  reject_tier_c: false
  response_format: list
  constraints: {}
evidence_input:
- source: tavily
  url: https://www.justwatch.com/us/movie/inception
  title: Inception - Where to Watch
  content: As of December 2024, Inception is streaming on Hulu and available for rent on multiple platforms.
  tier: B
expected:
  template_id: where_to_watch
  prompt_checks:
    required_sections:
    - system
    - developer
    - user
    must_contain:
    - Inception
    - watch
    - as of
    must_not_contain:
    - Tier
    - Kaggle
  evidence_checks:
    dedupe_expected_count: 1
    max_snippet_len: 400
  validator_checks:
    expected_valid: true
    enforce_clean: false
  sample_model_output: As of December 2024, Inception is streaming on Hulu and available for rent on multiple platforms.

