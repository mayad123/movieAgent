name: multi_intent_release_runtime
user_query: When did The Matrix come out and how long is it?
request_plan:
  intent: general_info
  request_type: info
  entities_typed:
    movies:
    - The Matrix
    people: []
  need_freshness: false
  freshness_ttl_hours: 168.0
  require_tier_a: false
  allowed_source_tiers:
  - A
  - B
  reject_tier_c: false
  response_format: short_fact
  constraints: {}
evidence_input:
- source: kaggle_imdb
  url: https://www.imdb.com/title/tt0133093/
  title: The Matrix
  content: The Matrix (1999) was released on March 31, 1999 and has a runtime of 136 minutes.
  year: 1999
  tier: A
expected:
  template_id: general_info
  prompt_checks:
    required_sections:
    - system
    - user
    must_contain:
    - release
    - runtime
    - The Matrix
    must_not_contain:
    - Tier
    - Kaggle
  evidence_checks:
    dedupe_expected_count: 1
    max_snippet_len: 400
  validator_checks:
    expected_valid: true
    enforce_clean: false
  sample_model_output: The Matrix was released on March 31, 1999 and has a runtime of 136 minutes.

