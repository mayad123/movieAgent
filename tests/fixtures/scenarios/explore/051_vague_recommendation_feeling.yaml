name: vague_recommendation_feeling
user_query: I'm feeling sad, what should I watch?
request_plan:
  intent: recommendation
  request_type: recs
  entities_typed:
    movies: []
    people: []
  need_freshness: false
  freshness_ttl_hours: 336.0
  require_tier_a: false
  allowed_source_tiers:
  - A
  - B
  - C
  reject_tier_c: false
  response_format: list
  constraints: {}
evidence_input:
- source: tavily
  url: https://www.rottentomatoes.com/browse/movies_at_home/
  title: Uplifting Movies
  content: Films that may help include The Pursuit of Happyness, Inside Out, and The Shawshank Redemption for emotional resonance.
  tier: B
expected:
  template_id: recommendation
  prompt_checks:
    required_sections:
    - system
    - developer
    - user
    must_contain:
    - recommend
    must_not_contain:
    - Tier
    - Kaggle
  evidence_checks:
    dedupe_expected_count: 1
    max_snippet_len: 400
  validator_checks:
    expected_valid: true
    enforce_clean: false
  sample_model_output: Here are some films that might help: 1. The Pursuit of Happyness (2006) - An inspiring true story of perseverance. 2. Inside Out (2015) - A thoughtful exploration of emotions. 3. The Shawshank Redemption (1994) - A story of hope and friendship. These films offer different approaches to emotional uplift, from inspirational stories to thoughtful character studies. Each provides moments of emotional resonance that can be comforting or uplifting. Whether you're looking for inspiration or emotional understanding, these films offer meaningful viewing experiences.

