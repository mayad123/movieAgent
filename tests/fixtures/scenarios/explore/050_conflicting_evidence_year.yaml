name: conflicting_evidence_year
user_query: When was The Wizard of Oz released?
request_plan:
  intent: release_date
  request_type: release-date
  entities_typed:
    movies:
    - The Wizard of Oz
    people: []
  need_freshness: false
  freshness_ttl_hours: 6.0
  require_tier_a: false
  allowed_source_tiers:
  - A
  - B
  reject_tier_c: false
  response_format: short_fact
  constraints: {}
evidence_input:
- source: kaggle_imdb
  url: https://www.imdb.com/title/tt0032138/
  title: The Wizard of Oz
  content: The Wizard of Oz (1939) premiered on August 15, 1939.
  year: 1939
  tier: A
- source: tavily
  url: https://www.rottentomatoes.com/m/the_wizard_of_oz_1939
  title: The Wizard of Oz
  content: The Wizard of Oz was released on August 25, 1939 in the United States.
  tier: B
expected:
  template_id: release_date
  prompt_checks:
    required_sections:
    - system
    - developer
    - user
    must_contain:
    - release
    - The Wizard of Oz
    - 1939
    must_not_contain:
    - Tier
    - Kaggle
  evidence_checks:
    dedupe_expected_count: 2
    max_snippet_len: 400
  validator_checks:
    expected_valid: true
    enforce_clean: false
  sample_model_output: The Wizard of Oz was released in August 1939.

