name: vague_recommendation_something_good
user_query: Recommend something good to watch.
request_plan:
  intent: recommendation
  request_type: recs
  entities_typed:
    movies: []
    people: []
  need_freshness: false
  freshness_ttl_hours: 336.0
  require_tier_a: false
  allowed_source_tiers:
  - A
  - B
  - C
  reject_tier_c: false
  response_format: list
  constraints: {}
evidence_input:
- source: tavily
  url: https://www.rottentomatoes.com/browse/movies_at_home/
  title: Popular Movies
  content: Popular highly-rated films include The Shawshank Redemption, The Godfather, and Parasite.
  tier: B
expected:
  template_id: recommendation
  prompt_checks:
    required_sections:
    - system
    - developer
    - user
    must_contain:
    - recommend
    must_not_contain:
    - Tier
    - Kaggle
  evidence_checks:
    dedupe_expected_count: 1
    max_snippet_len: 400
  validator_checks:
    expected_valid: true
    enforce_clean: false
  sample_model_output: Here are some highly-rated films worth watching: 1. The Shawshank Redemption (1994) - A powerful drama about hope and friendship. 2. The Godfather (1972) - A classic crime epic. 3. Parasite (2019) - A masterful social thriller. These films represent excellent storytelling across different genres and time periods. Each offers compelling narratives and memorable characters that have resonated with audiences worldwide. Whether you're looking for drama, crime, or thriller elements, these films deliver exceptional quality in their respective categories.

